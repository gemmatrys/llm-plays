# Terrain map: per-tileset passability + portals for the ASCII map renderer.
#
# CONVENTION (matches the game's own collision check): ids are the BOTTOM-LEFT
# 8x8 subtile of each 2x2-tile block. When harvesting from a raw-id dump, read
# the bottom-left corner of each block (odd row, even col), not every subtile —
# mixed blocks like overworld flower ground (2c/03) are classified by that one
# corner, exactly as Gen 1 does it.
#
# HOT FILE: reloaded on change, no harness restart. Checkpoints append entries
# as the run reaches new tilesets (unknown tileset -> the model sees a raw-id
# dump tagged with the tileset id = the harvesting view). A parse error keeps
# the last good table and raises a tiles_invalid escalation.
#
# `portal` ids render as D (doors/stairs/cave mouths) in ADDITION to the
# always-on warp-table overlay; leave empty until verified live.
tilesets:
  "0x00":
    name: overworld
    # pokered's overworld collision list (bottom-left ids) — live-validated on
    # Route 1 2026-07-20: speckled ground 0x39, tall grass 0x52, flower ground
    # (bl 0x2c) all open; bush blocks (bl 0x50), ledges (0x36/0x37), sign,
    # water all blocked.
    walkable: ["0x00","0x10","0x1b","0x20","0x21","0x23","0x2c","0x2d","0x2e",
               "0x30","0x31","0x33","0x39","0x3c","0x3e","0x52","0x54","0x58","0x5b"]
    portal: []
    # `grass` = the tileset's wild-encounter grass tile, from the pokered
    # tileset headers (authoritative, one per tileset). Renders " on the
    # map; walk_to_grass BFS-walks to the nearest patch. When the FOREST
    # tileset (0x03) gets harvested, its grass id is 0x20 (same source).
    grass: ["0x52"]
    # one-way: hop DOWN across from above (renders v; BFS jumps them), solid
    # from below. LIVE-VERIFIED ONLY — 0x55 was added from recalled pokered
    # data and turned out to be a FENCE (hard obstacle, user-confirmed
    # 2026-07-20 east Viridian): never extend this list without watching an
    # actual hop happen on that tile id.
    ledge_down: ["0x36", "0x37"]
  "0x01":
    name: reds_house
    # both floors; floor blocks are uniform 0x01 — verified live 2026-07-20
    walkable: ["0x01"]
    portal: []
  "0x05":
    name: dojo_gym_lab
    # Oak's lab; floor blocks uniform 0x11 — verified live 2026-07-20
    walkable: ["0x11"]
    portal: []
  "0x02":
    name: mart
    # harvested live 2026-07-20 in the Viridian Mart (map 42): floor 0x11,
    # floor-with-shadow 0x1a (player stood on it), 0x1c = exit doormat pair
    # at the south map edge; shelves/counter (0x17/0x19/0x28/0x3e/0x50/0x51/
    # 0x54/0x55/0x10) blocked. 0x1e unverified — add if a wedge shows it open.
    walkable: ["0x11", "0x1a", "0x1c"]
    portal: ["0x1c"]
    # `counter` = the game's own talk-across-the-counter tile ids, from the
    # pokered tileset headers (authoritative) — consumed by walk_to_counter's
    # [person][counter][space] pattern search.
    counter: ["0x18", "0x19", "0x1e"]
  "0x06":
    name: pokecenter
    # (marts turned out to use tileset 0x02, not this one)
    # harvested live 2026-07-20 in the Viridian Poke Center (map 41): floor
    # 0x11 open (uniform, like the lab); counter/console 0x34/0x3c/0x2a/0x1a,
    # plants 0x30/0x32 blocked; 0x1c = entry doormat. More ids may need
    # adding if a Mart/Center corner renders blocked that the screenshot
    # shows open.
    walkable: ["0x11", "0x1c"]
    portal: ["0x1c"]
    # game's talk-across counter ids (pokered tileset headers; same trio as
    # the mart) — consumed by walk_to_counter
    counter: ["0x18", "0x19", "0x1e"]
  "0x09":
    name: forest_gate
    # pokered Gate_Coll (ForestGate/Museum/Gate share it) — ingested
    # 2026-07-21 while the model stood WEDGED in the south gate (map 50,
    # unharvested tileset = walk macros dead). Counter ids from the
    # tileset headers (the gate guard's desk).
    walkable: ["0x01","0x12","0x14","0x1a","0x1c","0x37","0x38","0x3b","0x3c","0x5e"]
    portal: []
    counter: ["0x17", "0x32"]
  "0x03":
    name: forest
    # pokered Forest_Coll, ingested 2026-07-21 ahead of goal 11 (the
    # forest grind needs walk macros + grass from the first step).
    # Grass id 0x20 from the tileset headers.
    walkable: ["0x1e","0x20","0x2e","0x30","0x34","0x37","0x39","0x3a","0x40",
               "0x51","0x52","0x5a","0x5c","0x5e","0x5f"]
    portal: []
    grass: ["0x20"]
  "0x07":
    name: gym
    # pokered Gym_Coll, ingested 2026-07-21 ahead of goal 14 (Pewter Gym /
    # Brock) — an unharvested gym tileset would kill every walk macro at the
    # door. Counter id 0x3a from the tileset headers (the gym has no
    # walk-up desk in Pewter, but the id is authoritative). No grass.
    walkable: ["0x03","0x11","0x16","0x19","0x2b","0x3c","0x3d","0x3f",
               "0x4a","0x4c","0x4d"]
    portal: []
    counter: ["0x3a"]
  "0x0a":
    name: museum
    # pokered: Museum_Coll IS Gate_Coll (shared label with ForestGate_Coll,
    # same list as tileset 0x09 above); counters 0x17/0x32 from the tileset
    # headers. Ingested 2026-07-21 — goal says skip the museum, but a
    # misstep inside would otherwise land in an unmapped tileset.
    walkable: ["0x01","0x12","0x14","0x1a","0x1c","0x37","0x38","0x3b","0x3c","0x5e"]
    portal: []
    counter: ["0x17", "0x32"]
  "0x08":
    name: house
    # generic house interior — harvested live 2026-07-20 in a Viridian home
    # (map 44): floor 0x01 open; 0x10 void/wall, furniture 0x12/0x2f/0x36/
    # 0x3a/0x3c, plants 0x08/0x18 blocked; 0x14 = exit doormat (bottom row).
    walkable: ["0x01", "0x14"]
    portal: ["0x14"]
