# Quest tree — Pokémon Red, Bulbasaur run. SEED: copied to the run dir at
# creation; the live copy is machine-rewritten (status marks) and
# checkpoint-edited (refinements, un-stamps) — comments survive only here.
#
# Contract (harness/quests.py renders this; PLAN §1):
# - model sees: act ladder (done collapsed, YOU ARE HERE), current act's
#   done quests one line, ONE current quest + DONE line + time budget,
#   global rules + current act's rules_extra. Everything else (verify,
#   ids, comments) is checkpoint-side.
# - model marks: done_goal -> status done (goal_stamped / act_stamped
#   escalations); COACH note -> status coach. Checkpoint validates
#   against each act's `verify` and edits this file live.
# - Acts 1-10 quests are DRAFTS from plans/pokemon_red/master-plan.md:
#   refine each act at its act_stamped alarm BEFORE it goes live —
#   facts marked GUESS in the master plan stay guesses here until
#   fetched from pret or verified live. Structure over correctness.
version: 1
game_goal: Beat the game - defeat the Elite Four at Indigo Plateau,
  which needs ALL 8 GYM BADGES first.
preamble: |
  Your current quest is one small step on this road. Unsure about it in
  ANY way - looks done, looks impossible, or you just do not know what
  to do? Put "COACH: <what and why>" in your notes. The coach is
  alerted at once and makes the hard calls; flagging is always the
  right move.
rules: |
  Rules (the FIRST rule that fits the screen wins - run it and stop
  thinking; the current quest's own text outranks this list; a rule you
  cannot follow right now does not apply - skip it without discussion):
  - Poke Balls only work on WILD Pokemon (the battle line says WILD);
    in a trainer battle they are simply lost. Only throw a ball when
    the current quest is a catching quest.
  - Anything that CONFIRMS something (take, buy, learn, a yes/no about
    a specific choice) gets ONE press after READING what the screen
    names - never a mash.
  - When the screen says your Pokemon is evolving, WAIT it out - press
    nothing; B cancels evolutions forever.
  - Buy ONLY what a quest lists. Nothing else.
  - Nickname prompts: NO (press B). If a letter grid ever opens
    anyway: B only deletes letters - escape with press_A, press_START,
    press_A.
  - Leaving a building puts you ON its doorstep: a step UP walks back
    in. Step away first. Entering any door is a single step onto it -
    walks stop BESIDE doors on purpose.
  - In the little gate buildings, cross the room with plain walks and
    step through the FAR doorway - the one ahead, not the one you came
    in by.
  - Mark a quest done when, as far as you can tell, its DONE line
    happened - the coach checks every stamp and fixes mistakes, so an
    honest wrong stamp costs nothing. What you must NEVER do is stamp
    a quest to escape it because it feels hard - that is what the
    "COACH:" flag is for.
acts:
  - id: act0
    title: Start the journey - choose BULBASAUR and finish Oak's errand
    verify: "team line shows BULBASAUR (and nothing else early); Pokedex
      obtained; owned species >= 3; POKE BALLs in bag. Wrong starter =
      the ONE pre-authorized loadstate rollback."
    rules_extra: |
      - A fight this act's quests do not say how to handle: attack_1
        (TACKLE).
      - POISONED outside battle: use_antidote once the bag has one - or
        any Pokemon Center. Do not walk it off; it drains HP.
    quests:
      - id: a0-newgame
        title: Start a brand-new game
        status: todo
        budget_min: 15
        text: |
          Start a BRAND-NEW game. This cartridge has no saved game: on
          the title screen pick NEW GAME (the usual CONTINUE rule does
          not apply - there is nothing to continue). Mash through the
          professor's welcome speech. At the NAME screen: press DOWN
          once, then A - that takes the first ready-made name. If a
          screen full of letters opens anyway: press_A, then
          press_START, then press_A escapes it. The same happens once
          more for the other boy's name.
        done: your location reads Red's House 2F
      - id: a0-outside
        title: Went downstairs and outside
        status: todo
        budget_min: 5
        text: |
          Go downstairs and outside. The stairs work by walking onto
          them; the front door is at the bottom of the house.
        done: your location reads Pallet Town
      - id: a0-oak
        title: Was walked to Oak's lab
        status: todo
        budget_min: 10
        text: |
          Walk NORTH toward the tall grass at the top edge of town. An
          old man will stop you himself and walk you to his lab - that
          is the plan, let him; mash through everything he says. You
          never reach the grass and that is correct.
        done: your location reads Professor Oak's lab
      - id: a0-starter
        title: Chose BULBASAUR
        status: todo
        budget_min: 15
        text: |
          Choose BULBASAUR - read before you touch. Three Poke Balls
          sit on the table. At each ball: press A once and READ the
          words - the screen names which Pokemon it is. Keep progress
          in your notes ("ball 1 was CHARMANDER, trying next") and fix
          the notes when the screen disagrees.
          (a) Read a ball's label.
              Check: the dialogue names a Pokemon.
          (b) If it names BULBASAUR: answer YES with ONE press. If it
              names anything else: answer NO with ONE press of B and
              read the next ball. Never confirm a ball you have not
              read.
              Check: the team line shows BULBASAUR.
          (c) The nickname question: answer NO (one press B).
        done: your team line shows BULBASAUR
      - id: a0-rival1
        title: Fought the rival's Charmander
        status: todo
        budget_min: 15
        text: |
          Beat the rival boy's CHARMANDER (he attacks you before you
          can leave). Use attack_1 (TACKLE) every turn; when he uses
          GROWL nothing bad happens, keep attacking. If you lose you
          only lose some money - carry on either way.
        done: the battle is over and your location still reads
          Professor Oak's lab
      - id: a0-viridian
        title: Walked Route 1 to Viridian
        status: todo
        budget_min: 20
        text: |
          Walk to Viridian City: leave the lab (south over the mats),
          walk north out of town onto Route 1 (the gap in the top
          edge, near the grass), then north the whole length of Route
          1. Wild PIDGEY and RATTATA live in the grass: fight them
          with TACKLE for experience or flee_battle - either is fine;
          you have no Poke Balls yet, so never try to catch.
        done: your location reads Viridian City
      - id: a0-parcel
        title: Took the parcel
        status: todo
        budget_min: 10
        text: |
          Get the parcel: enter the Viridian Poke Mart (the "Viridian
          Mart door" bearing), walk to the counter and talk - the
          clerk hands you a parcel for Professor Oak without being
          asked.
        done: '"[bag: +1 OAK''s PARCEL]" happened'
      - id: a0-deliver
        title: Delivered it, got the Pokedex
        status: todo
        budget_min: 20
        text: |
          Deliver it: walk back south to Pallet Town (Route 1 south -
          the little ledges hop DOWN only; hopping down is a shortcut,
          never try to climb one), enter the lab, talk to Professor
          Oak and mash through the scene - he takes the parcel, and
          both boys receive a POKEDEX.
        done: '"[bag: -1 OAK''s PARCEL]" happened and the POKEDEX scene
          played'
      - id: a0-shop
        title: Bought balls and antidotes
        status: todo
        budget_min: 15
        text: |
          Shop: return north to Viridian City and buy at the Mart:
          buy_poke_ball_x5, then buy_antidote_x3. Every "[bag: +N ...]"
          event is the proof. This shelf sells no POTIONs - Potion
          rules do not apply until Pewter City.
        done: the bag shows 5 POKE BALLs and 3 ANTIDOTEs
      - id: a0-catch-r1
        title: Caught on Route 1
        status: todo
        budget_min: 30
        text: |
          Catch your first Pokemon in the Route 1 grass (south gap of
          town): fight a PIDGEY or RATTATA down to yellow or red HP
          with TACKLE, then use_poke_ball. If the ball misses, hit
          once more and throw again. Catch one PIDGEY and one RATTATA.
        done: your state line says you have owned 3 or more kinds of
          Pokemon
      - id: a0-catch-r22
        title: Caught a Nidoran on Route 22
        status: todo
        budget_min: 30
        text: |
          Catch a NIDORAN on Route 22: the road WEST out of Viridian
          (the "gap to Route 22" bearing). Same drill: weaken with
          TACKLE, use_poke_ball. Either kind of NIDORAN counts. If the
          rival boy appears and demands a fight: fight him with TACKLE
          - a loss costs money only.
        done: your state line says you have owned 4 or more kinds of
          Pokemon
      - id: a0-heal
        title: Healed at the Viridian Center
        status: todo
        budget_min: 10
        text: |
          Heal at the Viridian Pokemon Center (the "Viridian Center
          door" bearing): walk to the counter, answer the nurse's
          question with ONE press A, mash through the rest. Then stay
          near the Center - the next quest arrives.
        done: your team is at full HP and your location reads Viridian
          Pokemon Center
  - id: act1
    title: Win the BOULDER badge from Brock in Pewter City
    verify: "RAM badges byte 0x00 -> BOULDER bit set; TM34 bag event.
      (Two false BOULDERBADGE stamps happened in limits-4 at badges=0 -
      the byte is the anchor, never the announcement.)"
    rules_extra: |
      - A fight this act's quests do not say how to handle: attack_1
        (TACKLE) until VINE WHIP is learned, then attack_4 (VINE WHIP).
      - No POTIONs are in the bag until Pewter - Potion rules do not
        apply in the forest; poison gets use_antidote right away.
    quests:
      - id: a1-route2
        title: Reached Route 2
        status: todo
        budget_min: 10
        text: |
          Walk north through Viridian to the top edge (the "gap to
          Route 2" bearing). An old man mid-town shows off how to
          catch a Pokemon (a scripted scene): mash his speech.
        done: your location reads Route 2
      - id: a1-gate
        title: Entered the forest
        status: todo
        budget_min: 10
        text: |
          North on Route 2 to the forest gate building (the "forest
          gate door" bearing); cross the room with plain walks and
          step through the doorway ahead into the trees.
        done: your location reads Viridian Forest
      - id: a1-forest-legs
        title: Crossed the forest maze
        status: todo
        budget_min: 45
        text: |
          The forest is a MAZE - do not chase the exit bearing
          directly; it crosses tree walls. Walk the legs in order and
          keep them in your notes ("legs done: a, b"):
          (a) to "the path north (east side)" bearing.
              Check: it reads "you are here" or 1-2 tiles.
          (b) north, then west along "the top corridor" bearing.
              Check: it reads "you are here" or 1-2 tiles.
          (c) down the west lane past "the west side path" toward
              "forest exit corner". A dropped item sits near the lane
              - pick it up ONLY if it reads 1-2 tiles while you are on
              the path.
              Check: "forest exit corner" reads 3 tiles or less.
        done: '"forest exit corner" reads 3 tiles or less'
      - id: a1-grind
        title: Ground to L13, hunted Pikachu
        status: todo
        budget_min: 90
        text: |
          Grind and catch in the forest grass near the exit corner:
          - catch PIKACHU if one EVER appears (rare and precious -
            always keep 2 balls spare for it);
          - catch one WEEDLE or CATERPIE (cheap, once);
          - fight everything else with TACKLE for experience. The BUG
            CATCHER trainers on the path pay money and give the best
            experience - fight the ones that stop you.
          Track levels in your notes ("L9... L11..."). If HP goes red
          twice with no way to heal, walk back to the Viridian Center,
          heal, and return through the gate.
        done: your team line shows BULBASAUR at level 13 or higher
          with VINE WHIP on its move list
      - id: a1-pewter
        title: Reached Pewter
        status: todo
        budget_min: 15
        text: |
          Exit the forest north: the doormats at "forest exit corner",
          through the north gate building (far doorway again), then
          Route 2 north to the "gap to Pewter" bearing. Do NOT enter
          the cave door on the way (its time comes much later).
        done: your location reads Pewter City
      - id: a1-heal
        title: Healed at Pewter
        status: todo
        budget_min: 10
        text: |
          Heal at the Pewter Center (the "Pewter Center door"
          bearing).
        done: your team is at full HP and your location reads Pewter
          Pokemon Center
      - id: a1-potions
        title: Bought Potions
        status: todo
        budget_min: 15
        text: |
          Buy POTIONs at the Pewter Mart (the "Pewter Mart door"
          bearing) until the bag holds 6 - buy_potion_x6, or fewer if
          money runs low; keep at least 600 in reserve. Every
          "[bag: +N POTION]" event is the proof.
        done: the bag shows 6 POTIONs, or money is at the reserve
          floor
      - id: a1-doormat
        title: Stood on the gym doormat
        status: todo
        budget_min: 20
        text: |
          Walk to "the doormat below the Gym entrance" bearing. The
          gym yard opens ONLY from the west; keep the legs in your
          notes:
          (a) from the Center, walk north up the west side of town.
          (b) turn east into the yard row toward the doormat.
          (c) stand on the doormat.
          The south edge of the yard row is a ONE-WAY LEDGE - a fall
          means starting again from (a); that is a restart, not a
          failure. If the yard refuses you twice, flag COACH and walk
          EAST along the main road instead - a man there stops anyone
          without a badge and WALKS THEM to the Gym himself; mash his
          speech and do not walk away.
        done: '"the doormat below the Gym entrance" reads "you are
          here"'
      - id: a1-enter
        title: Entered the gym
        status: todo
        budget_min: 5
        text: |
          Enter the gym: one step UP through the door above you
          (press_UP).
        done: your location reads Pewter Gym
      - id: a1-jr
        title: Beat the JR TRAINER
        status: todo
        budget_min: 15
        text: |
          Walk toward the "Brock" bearing. The JR TRAINER on the way
          must be fought (trainer battles cannot be fled): VINE WHIP
          (attack_4) beats his DIGLETT and SANDSHREW quickly. Below
          half HP afterward: use_potion.
        done: the "Brock" bearing reads 2 tiles or less
      - id: a1-brock
        title: Beat Brock
        status: todo
        budget_min: 45
        text: |
          Beat BROCK for the BOULDER badge: talk to him. His GEODUDE
          and ONIX are rock - VINE WHIP (attack_4) hits them very
          hard, two hits each. When ONIX is "storing energy" that is
          BIDE - it returns double the damage it takes; that turn is a
          fine use_potion turn. use_potion whenever you fall below
          half HP. If you black out you wake at the Center with half
          your money gone - heal and march back; after TWO losses,
          grind the forest to level 15 first.
        done: 'the badge announcement happened and "[bag: +1 TM34]"'
  - id: act2
    title: Cross Mt. Moon and win the CASCADE badge from Misty in
      Cerulean City
    verify: "badges byte has CASCADE bit; TM11 bag event; a fossil bag
      event on the way."
    rules_extra: |
      - A fight this act's quests do not say how to handle: attack_4
        (VINE WHIP); bugs and birds resist it - attack_1 (TACKLE)
        those.
      - Wild battles you do not need: flee_battle. Trainers cannot be
        fled.
    quests:
      - id: a2-restock
        title: Restocked at Pewter
        status: todo
        budget_min: 15
        text: |
          Restock at the Pewter Mart before leaving - there is no shop
          again until the far side of the mountain. In priority order,
          skipping what you cannot afford: POTIONs to 6, 1 ESCAPE
          ROPE, 2 ANTIDOTEs, 2 POKE BALLs. The bag events are the
          proof.
        done: the list is bought or money is spent down to about 100
      - id: a2-route3
        title: Fought down Route 3
        status: todo
        budget_min: 45
        text: |
          Leave Pewter east (the "east gap to Route 3" bearing) onto
          ROUTE 3. Trainers line this road; the ones facing the path
          stop you - fight them, use_potion below half HP. At the far
          east end the road climbs north to ROUTE 4 and a Pokemon
          Center by the cave mouth. Heal there. Inside, a man sells a
          MAGIKARP for 500: ONE press B, do not buy.
        done: your team is at full HP and your location reads Mt. Moon
          Pokemon Center
      - id: a2-mtmoon-1f
        title: Crossed Mt Moon 1F
        status: todo
        budget_min: 45
        text: |
          Enter MT MOON (the "cave entrance" bearing) at full HP. Wild
          ZUBAT and GEODUDE live here: flee what you do not need, but
          catch ONE ZUBAT if balls allow. Two dropped items sit on the
          way (bearings) - face each, press A, read the bag event. The
          way down is the northwest ladder (the "ladder down (1F
          northwest)" bearing); beat the HIKER standing over it.
        done: your location reads Mt. Moon B1F
      - id: a2-mtmoon-deep
        title: Fossils and daylight
        status: todo
        budget_min: 45
        text: |
          Cross B1F (the "ladder down to the bottom floor" bearing) to
          the bottom floor. ROCKETS in black fight you on the way. A
          SUPER NERD guards two fossils: beat him, take the LEFT one,
          answer its question with ONE press A. If a PARAS appears
          down here and a spare ball remains: weaken with TACKLE and
          catch it. Leave by "ladder out past the fossils", then the
          "daylight exit to Route 4".
        done: your location reads Route 4 and a fossil's bag event
          happened
      - id: a2-cerulean
        title: Reached Cerulean
        status: todo
        budget_min: 15
        text: |
          Walk EAST the whole length of Route 4 into CERULEAN CITY
          (the "gap to Cerulean" bearing). The ledges beside the road
          hop SOUTH one-way: dropping is fine, climbing back is
          impossible - keep east on whichever level you land.
        done: your location reads Cerulean City
      - id: a2-heal
        title: Healed at Cerulean
        status: todo
        budget_min: 10
        text: |
          Heal at the Cerulean Center (the "Cerulean Center door"
          bearing). BULBASAUR evolves at level 16: if the screen says
          it is evolving, WAIT - never press B during the change.
        done: your team is at full HP and your location reads Cerulean
          Pokemon Center
      - id: a2-grind
        title: Ground to L18+
        status: todo
        budget_min: 45
        text: |
          If the team line is below IVYSAUR level 18: grind the grass
          beside the city (south, by the Route 4 ledges) until it
          reads 18 or higher. Do NOT cross the bridge north of town
          yet - its trainers are the next act's business.
        done: your team line shows IVYSAUR at level 18 or higher
      - id: a2-misty
        title: Beat Misty
        status: todo
        budget_min: 45
        text: |
          Beat MISTY in the Cerulean Gym (north part of town; one
          swimmer trainer stands before her). Her STARYU and STARMIE
          are water: VINE WHIP hits them double. STARMIE hits hard -
          use_potion below half and keep attacking. After TWO losses,
          grind to level 20 and return.
        done: 'the badge announcement happened and "[bag: +1 TM11]"'
  - id: act3
    title: Meet Bill, sail the S.S. Anne, and win the THUNDER badge
      from Lt. Surge in Vermilion City
    verify: "badges byte has THUNDER bit; HM01 and TM24 bag events;
      S.S. TICKET obtained then consumed; CUT on the team's move list."
    rules_extra: |
      - A fight this act's quests do not say how to handle: attack_4
        (VINE WHIP); bugs and birds and fire: attack_1.
      - When a level-up asks to learn POISONPOWDER: YES, and forget
        GROWL (read the menu, one press per screen).
    quests:
      - id: a3-rival
        title: Beat the rival at the bridge
        status: todo
        budget_min: 30
        text: |
          Heal, then walk north out of Cerulean toward the bridge. The
          RIVAL waits at its foot: his PIDGEOTTO resists vines -
          TACKLE it; his ABRA only teleports in place - free hits; his
          CHARMANDER resists vines - TACKLE. use_potion below half.
        done: the rival is beaten (his goodbye speech happened)
      - id: a3-bridge
        title: Cleared Nugget Bridge
        status: todo
        budget_min: 45
        text: |
          NUGGET BRIDGE: five trainers in a row, one fight at a time;
          heal at the Center between fights if below half (beaten
          trainers stay beaten). The man at the far end gives a NUGGET
          and then attacks - fight him too.
        done: '"[bag: +1 NUGGET]" happened and no one on the bridge
          stops you'
      - id: a3-bill
        title: Got the S.S. Ticket
        status: todo
        budget_min: 60
        text: |
          Follow the road east then north to BILL'S HOUSE (Routes 24
          and 25; about ten trainers stop you on the way - fight them,
          use_potion below half; catch ONE ODDISH if it appears).
          At the cottage: talk to the creature on the floor - it is
          BILL; mash his story, answer YES to help, walk to the
          MACHINE and press A, then talk to Bill again.
        done: '"[bag: +1 S.S. TICKET]" happened'
      - id: a3-rocket-house
        title: Chased the Cerulean burglar
        status: todo
        budget_min: 30
        text: |
          Back to Cerulean; heal. The house north of the gym was
          burgled: enter, walk out the smashed back wall, and fight
          the ROCKET in the yard - he hands over TM28 when beaten.
        done: '"[bag: +1 TM28]" happened'
      - id: a3-south
        title: Underground to Vermilion
        status: todo
        budget_min: 40
        text: |
          South out of Cerulean (Route 5, one-way ledges downhill).
          The Saffron gate guard turns you back - use the UNDERGROUND
          PATH instead: enter the house beside the gate, take the
          stairs, walk the long tunnel, come up on Route 6, and
          continue south into VERMILION CITY. Heal at the Center.
        done: your location reads Vermilion Pokemon Center and the
          team is at full HP
      - id: a3-ship
        title: Got HM01 from the captain
        status: todo
        budget_min: 60
        text: |
          THE SHIP leaves forever once you walk off it - everything on
          board happens THIS visit. Board at the dock south of town
          (your ticket is checked automatically). Work toward the
          CAPTAIN'S room at the top of the stern stairs. The RIVAL
          blocks the way: same answers as the bridge - TACKLE the
          bird, VINE WHIP the rest, use_potion below half. In the
          Captain's room, talk and mash - you rub his back and he
          hands over HM01. Do not leave the ship before the bag event.
        done: '"[bag: +1 HM01]" happened'
      - id: a3-cut
        title: Taught CUT
        status: todo
        budget_min: 15
        text: |
          Leave the ship (it sails as you step off - expected). Teach
          CUT: use HM01 on IVYSAUR and forget TACKLE (read each menu,
          one deliberate press per screen). CUT becomes your neutral
          attack in slot 1.
        done: CUT is on the team line's move list
      - id: a3-cans
        title: Solved the trash cans
        status: todo
        budget_min: 45
        text: |
          The gym door is behind a small TREE: stand beside it,
          use_cut, and enter. Inside, the door to the leader is locked
          by TWO switches hidden in TRASH CANS: press A on cans; when
          one clicks, the second switch is ALWAYS in a can touching
          it - check each neighbor. A wrong neighbor resets both
          (lights out, start over - that is the puzzle working, not a
          bug; note it, do not flag it). Gym trainers may interrupt -
          electric hits IVYSAUR for half.
        done: the locked gate opens (both switches clicked)
      - id: a3-surge
        title: Beat Lt. Surge
        status: todo
        budget_min: 45
        text: |
          Beat LT. SURGE: his VOLTORB, PIKACHU, and RAICHU are all
          electric - IVYSAUR takes half from it; VINE WHIP them
          (attack_4). use_potion below half.
        done: 'the badge announcement happened and "[bag: +1 TM24]"'
      - id: a3-tm24
        title: Taught Thunderbolt
        status: todo
        budget_min: 10
        text: |
          If PIKACHU is on the team: use TM24 on PIKACHU - learn
          THUNDERBOLT, forget GROWL (read the menus, one press per
          screen). If there is no Pikachu, mark this done and move on.
        done: THUNDERBOLT is on Pikachu's move list, or the team has
          no Pikachu
  - id: act4
    title: Reach Celadon City through Rock Tunnel and win the RAINBOW
      badge from Erika
    verify: "badges byte has RAINBOW bit; HM05 + TM13 + TM21 bag
      events; FLASH taught; owned species >= 10 confirmed by Pokedex
      RAM at the aide."
    rules_extra: |
      - A fight this act's quests do not say how to handle: attack_4
        (VINE WHIP); bugs, birds, fire, grass: attack_1 (CUT is slot
        1 after the S.S. Anne).
      - The second FRESH WATER is spoken for - never drink it, never
        give it away; a quest will say when.
    quests:
      - id: a4-species
        title: Counted to 10 kinds
        status: todo
        budget_min: 30
        text: |
          The aide ahead pays out only at 10 kinds of Pokemon owned -
          your state line carries the count. If it is below 10: the
          house by the Vermilion Center gives an OLD ROD free (talk,
          YES) - fish a MAGIKARP from any water edge (+1); the cave
          ahead guarantees DIGLETT (+1). Plan the gap in your notes.
        done: your state line says you have owned 10 or more kinds,
          or your notes list the catches that will get there
      - id: a4-diglett
        title: Through Diglett's Cave
        status: todo
