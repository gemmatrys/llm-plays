# Pokémon Red (Game Boy, via mGBA) — the Phase 1 target.
name: pokemon_red
platform: gb
driver: mgba
rom: null  # informational; the ROM is loaded in mGBA manually for now

buttons: [A, B, START, SELECT, UP, DOWN, LEFT, RIGHT]
decision_cadence_s: 20.0  # user 2026-07-21 after the audit found the old 30s
                          # floor binding ~half of decisions (median LLM time
                          # 28s). Slow thinking still runs at its natural
                          # pace, capped by ladder.llm_timeout_s.

ladder:
  # rotated one per fallback: advances dialogue (A), backs out of menus/naming
  # traps (B), and walks all directions - so a brain outage can't get wall-stuck,
  # menu-stuck, OR mash a garbage name on the naming grid (the old "AA" bug).
  scripted_fallback: [mash_a, press_RIGHT, press_UP, press_B, mash_a, press_DOWN, press_LEFT]
  safe_idle: wait
  allow_random: true          # the fish clause: Red is fish-beatable
  llm_timeout_s: 240.0  # ENFORCE >=15 decisions/hr: the watchdog forces a
                        # fallback action if rung-1 hasn't answered in 240s, so
                        # deep thinking gets room but liveness is guaranteed.
                        # HTTP timeout in llm.py sits 10s below this (frees the
                        # single worker before the watchdog gives up).
  demote_after_failures: 3
  promote_after_successes: 5
  max_plan_len: 8             # one LLM call may plan up to 8 behaviors
  plan_abort_pct: 0.4         # cancel remaining plan if the screen changes this much

ratchet:
  interval_s: 300             # savestate every 5 minutes
  savestate_slot: 1
  ingame_save_behavior: null  # not needed while savestates work

escalation:
  # Four detectors (harness/stuckness.py; <=0 disables one). Screen novelty
  # alone is blind to UIs that echo inputs back — the naming grid minted a
  # fresh phash per typed letter and held the screen clock at bay for good.
  stagnant_after_s: 1200      # screen: 20 min with no NOVEL screen
  pos_stagnant_after_s: 900   # position: 15 min pinned in a 2-tile box, no RAM progress
  pos_box_tiles: 2
  behavior_stagnant_after_s: 600  # behavior loop: 10 min of <=3 behaviors while pinned
  behavior_distinct_max: 3
  milestone_stagnant_after_s: 7200  # no badge/map/party change for 2 h - slow, sure alarm
  self_rescue: true           # first response: one get_unstuck burst, not a Claude wake
  rescue_grace_s: 300         # the rescue gets 5 min to show progress before escalating
  max_wakes_per_window: 2
  window_s: 18000             # 5 h
  # every escalation (any kind) launches this detached, >=300s apart:
  # Windows toast + sound; swap for a webhook/Claude wake without code changes
  alert_cmd: ["powershell", "-NoProfile", "-ExecutionPolicy", "Bypass",
              "-File", "tools/escalation_alert.ps1"]
  alert_cooldown_s: 300

# WRAM addresses (Gen 1, US Red/Blue) — verify against a memory map in Phase 0.
ram_map:
  badges: "0xD356"
  map_id: "0xD35E"
  pos_y: "0xD361"   # player tile coords on the current map: movement/stuck signal
  pos_x: "0xD362"
  party_count: "0xD163"

# shown to the MODEL (its {ram} view + logs) but never milestone-tracked:
context_ram_map:
  in_battle: "0xD057"   # 0=none, 1=wild, 2=trainer - kills battle-vs-menu misreads
  map_h: "0xD368"       # current map height/width in 2x2 blocks (pret
  map_w: "0xD369"       # wCurMapHeight/Width) - feeds the edge-awareness line

# Natural-language state rendering (user rule: no technical jargon anywhere
# the model reads). Sentence template with {v}, value->sentence map for
# enums, ~ hides the field; unlisted keys keep the raw "- key: value" line.
state_lines:
  place: "You are in {v}."
  map_id: ~            # pure jargon; "place" already names the area
  pos_x: "Your map position, west-east: x = {v}."
  pos_y: "Your map position, north-south: y = {v} (walking north makes it smaller)."
  badges: "You have {v} gym badges."
  money: "You are carrying ¥{v}."
  party_count: ~       # the team line below already shows every Pokemon
  party: "Your team: {v}"
  bag: "Your bag holds: {v}."
  bearings: "Landmarks from where you stand: {v}."
  battle_hint: "About this battle: {v}"
  map_h: ~             # block dims feed the edges line; raw numbers are jargon
  map_w: ~
  edges: "{v}"         # already a full sentence from the harness
  can_move: "{v}"      # already a full sentence from the harness
  last_move: "Your last movement: {v}."
  in_battle:
    0: "You are NOT in a battle."
    1: "You are IN a battle with a WILD Pokemon."
    2: "You are IN a battle with a TRAINER's Pokemon."

# On-screen tile grid -> ASCII walkability map (harness/tilemap.py). addr/cols/
# rows are SOLID (Gen 1 wTileMap = 20x18 WRAM buffer). player_col/row verified
# live 2026-07-20 (screen/map alignment confirmed against a screenshot).
# Walkability is PER-TILESET (wCurMapTileset, 0xD367): indoor rooms reuse ids
# the overworld treats as open — house floor 0x01 vs wall 0x00 collide exactly
# backwards. A tileset with no entry renders the raw tile ids, which is how you
# harvest a new tileset's set: stand in the room, read the dump, mark what the
# screenshot shows as open. Tileset 1 (Red's house) verified live 2026-07-20.
tilemap:
  addr: "0xC3A0"
  cols: 20
  rows: 18
  player_col: 8
  player_row: 8
  window: 4           # 9x9 box around the player
  tileset_addr: "0xD367"
  # per-tileset terrain (walkable + portal, block bottom-left ids) lives in
  # this HOT file — checkpoints extend it live, no restart needed:
  tiles_file: data/pokemon_red/tiles.yaml

# game-verified inventory: rendered as `bag=` in the model's {ram} view and
# diffed into "[bag: +1 X]" events; names in the HOT items.yaml (checkpoint
# harvests unknown ITEM_0xXX ids as they appear)
bag:
  count_addr: "0xD31D"   # wNumBagItems
  items_addr: "0xD31E"   # wBagItems: (id, qty) pairs
  names_file: data/pokemon_red/items.yaml

# party= view: nick/species/level/HP/status per mon (offsets live-verified)
party:
  names_file: data/pokemon_red/species.yaml
  moves_file: data/pokemon_red/moves.yaml

# battle_hint= view: enemy identity + Gen 1 type-chart math, computed
battle:
  types_file: data/pokemon_red/types.yaml

driver_opts:
  host: 127.0.0.1
  port: 8765

skills_dirs:
  - skills/common
  - skills/pokemon_red

# NOTE: this file configures the HARNESS only. It is COLD config: editing it
# requires tearing down the harness and starting a new run segment (each run
# snapshots the profile it ran under). Gemma-facing prompt assets live in
# prompts/pokemon_red/ — that is the HOT surface checkpoints rewrite mid-run.
