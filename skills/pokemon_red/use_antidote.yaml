# Intent skill (2026-07-21): cure poison in ONE behavior - the manual
# drill cost 8 decisions and a Pokedex detour on the forest west path.
# OVERWORLD ONLY. Geometry: START menu pins to the top with UPs (no
# wrap), POKEDEX top -> ITEM is 2 DOWN; bag list pins to slot 1 with
# UPs; ANTIDOTE sits in slot 2 THIS RUN (balls slot 1 - append order);
# USE tops the USE/TOSS submenu; party cursor tops at the lead mon.
# Ends with a judge check that the menus actually closed.
name: use_antidote
description: Use an ANTIDOTE from the bag on your lead Pokemon (overworld only).
steps:
  - {button: START, hold_frames: 4, wait_frames: 30}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}    # pin top (POKEDEX)
  - {button: DOWN, hold_frames: 4, wait_frames: 8}
  - {button: DOWN, hold_frames: 4, wait_frames: 8}  # ITEM
  - {button: A, hold_frames: 4, wait_frames: 30}    # bag list
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}    # pin slot 1
  - {button: DOWN, hold_frames: 4, wait_frames: 8}  # slot 2 = ANTIDOTE
  - {button: A, hold_frames: 4, wait_frames: 20}    # USE/TOSS
  - {button: A, hold_frames: 4, wait_frames: 30}    # USE -> party screen
  - {button: A, hold_frames: 4, wait_frames: 40}    # lead mon
  - {op: advance_text}                              # "sprayed!"
  - {button: B, hold_frames: 4, wait_frames: 20}
  - {button: B, hold_frames: 4, wait_frames: 20}
  - {button: B, hold_frames: 4, wait_frames: 20}    # all the way out
  - {op: verify, wait_frames: 30,
     expect: "the overworld is on screen with no menu open"}
