# Intent skill (2026-07-21): the model says WHAT (buy the potions), this
# does HOW. Shop menus are fixed geometry: fresh conversation -> cursor
# tops at BUY; item list tops at slot 1; Pewter mart stocks POTION in
# slot 2 (pokered mart inventory). Quantity selector starts at x1.
# Use standing at the counter FACING the clerk. Proof is the
# "[bag: +5 POTION]" event; a short purse just cancels at the price ask
# (B backs out safely on the next decision).
name: buy_potion_x5
description: Talk to the shop clerk and buy 5 POTIONs in one behavior.
steps:
  - {op: advance_text}                              # greeting -> BUY/SELL/QUIT
  - {button: A, hold_frames: 4, wait_frames: 30}    # BUY (cursor tops there)
  - {op: advance_text}                              # "take your time" -> item list
  - {button: DOWN, hold_frames: 4, wait_frames: 12} # slot 2 = POTION
  - {button: A, hold_frames: 4, wait_frames: 20}    # quantity selector, x1
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}    # x5
  - {button: A, hold_frames: 4, wait_frames: 30}    # -> price yes/no
  - {button: A, hold_frames: 4, wait_frames: 40}    # YES (cursor tops at yes)
  - {op: advance_text}                              # "here you are" -> item list
  - {button: B, hold_frames: 4, wait_frames: 20}    # leave item list
  - {button: B, hold_frames: 4, wait_frames: 20}    # leave BUY/SELL/QUIT
  - {op: advance_text}                              # "come again!"
