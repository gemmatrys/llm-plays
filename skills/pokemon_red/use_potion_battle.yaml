# Intent skill (2026-07-21): drink a POTION mid-battle in ONE behavior
# (the Brock BIDE turn). Battle menus are geometry (see attack_1):
# collapse with B B, pin FIGHT top-left with UP LEFT, ITEM is DOWN from
# FIGHT. Bag list pins to slot 1; POTION sits in slot 3 AFTER the
# goal-17 purchase (balls 1, antidotes 2 - append order). Party cursor
# tops at the lead mon; the turn then plays out.
name: use_potion_battle
description: Use a POTION on your lead Pokemon during a battle and play the turn out.
steps:
  - {op: advance_text}
  - {button: B, hold_frames: 4, wait_frames: 24}
  - {button: B, hold_frames: 4, wait_frames: 24}
  - {button: UP, hold_frames: 4, wait_frames: 12}
  - {button: LEFT, hold_frames: 4, wait_frames: 12} # pin FIGHT
  - {button: DOWN, hold_frames: 4, wait_frames: 12} # ITEM
  - {button: A, hold_frames: 4, wait_frames: 30}    # bag list
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}
  - {button: UP, hold_frames: 4, wait_frames: 8}    # pin slot 1
  - {button: DOWN, hold_frames: 4, wait_frames: 8}
  - {button: DOWN, hold_frames: 4, wait_frames: 8}  # slot 3 = POTION
  - {button: A, hold_frames: 4, wait_frames: 30}    # -> party screen
  - {button: A, hold_frames: 4, wait_frames: 40}    # lead mon drinks
  - {op: advance_text}                              # turn plays out
